<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Osobne Financije</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1>Osobne Financije</h1>
        <p class="subtitle">Praćenje prihoda i rashoda</p>
      </div>
      <nav class="period-nav" role="tablist">
        <button class="period-btn active" data-period="day" role="tab" aria-selected="true">Dnevno</button>
        <button class="period-btn" data-period="month" role="tab" aria-selected="false">Mjesečno</button>
        <button class="period-btn" data-period="year" role="tab" aria-selected="false">Godišnje</button>
      </nav>
    </header>

    <main>
      <section class="date-nav">
        <button class="nav-btn" id="prevBtn" aria-label="Prethodno">&#8592;</button>
        <h2 id="periodLabel"></h2>
        <button class="nav-btn" id="nextBtn" aria-label="Sljedeće">&#8594;</button>
      </section>

      <section class="summary-cards">
        <div class="card card-income">
          <span class="card-label">Prihodi</span>
          <span class="card-value" id="totalIncome">0,00 €</span>
        </div>
        <div class="card card-expense">
          <span class="card-label">Rashodi</span>
          <span class="card-value" id="totalExpense">0,00 €</span>
        </div>
        <div class="card card-balance">
          <span class="card-label">Saldo</span>
          <span class="card-value" id="totalBalance">0,00 €</span>
        </div>
      </section>

      <section class="chart-section" id="chartSection">
        <h3>Pregled po kategorijama</h3>
        <div class="chart-bars" id="categoryChart"></div>
      </section>

      <section class="form-section">
        <h3>Nova transakcija</h3>
        <form id="transactionForm">
          <div class="form-row">
            <label>
              Tip
              <select id="type" required>
                <option value="income">Prihod</option>
                <option value="expense">Rashod</option>
              </select>
            </label>
            <label>
              Iznos (€)
              <input type="text" id="amount" inputmode="decimal" placeholder="0,00" autocomplete="off" required>
            </label>
          </div>
          <div class="form-row">
            <label>
              Kategorija
              <select id="category" required></select>
            </label>
            <label>
              Datum
              <input type="date" id="date" required>
            </label>
          </div>
          <label class="full-width">
            Opis
            <input type="text" id="description" placeholder="Npr. Plaća, namirnice..." maxlength="100">
          </label>
          <button type="submit" class="btn-primary">Dodaj transakciju</button>
        </form>
      </section>

      <section class="transactions-section">
        <div class="section-header">
          <h3>Transakcije</h3>
          <span class="count-badge" id="transactionCount">0</span>
        </div>
        <ul class="transaction-list" id="transactionList"></ul>
        <p class="empty-state" id="emptyState">Nema transakcija za odabrani period.</p>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
